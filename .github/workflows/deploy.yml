name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            DEPLOY_PATH="/var/www/zeekerstech-main"

            echo ">>> Switching to project directory..."
            cd $DEPLOY_PATH

            echo ">>> Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo ">>> Installing dependencies..."
            if [ -f package.json ]; then
              npm install
            fi

            echo ">>> Building project (if build script exists)..."
            if npm run | grep -q "build"; then
              npm run build
            fi

            echo ">>> Building CSS (if available)..."
            if npm run | grep -q "build-css"; then
              npm run build-css
            fi

            echo ">>> Fixing permissions..."
            find $DEPLOY_PATH -type f -name "*.html" -exec chmod 644 {} \; || true
            find $DEPLOY_PATH -type f -name "*.css" -exec chmod 644 {} \; || true
            find $DEPLOY_PATH -type f -name "*.js" -exec chmod 644 {} \; || true

            echo ">>> Testing Nginx configuration..."
            nginx -t

            echo ">>> Reloading Nginx..."
            systemctl reload nginx

            echo ">>> Deployment complete!"