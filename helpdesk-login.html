<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk Login — Zeekers Technology Solutions</title>
    <link
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./assets/images/favicon.png">

    <style>
        :root {
            --accent: #ff6b2b;
            --accent-2: #ff9a5c;
            --accent-dark: #d94f10;
            --accent-light: #fff0ea;
            --accent-pale: #fff7f2;
            --ink: #12100e;
            --txt2: #5a5650;
            --txt3: #9a9490;
            --bg: #ffffff;
            --bg2: #fafaf8;
            --bg3: #f5f0ea;
            --line: rgba(0, 0, 0, 0.07);
            --sh-md: 0 8px 32px rgba(0, 0, 0, 0.10);
            --sh-or: 0 8px 32px rgba(255, 107, 43, 0.22);
            --r: 14px;
            --rl: 22px;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            height: 100%
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg3);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        /* ── TOPBAR ── */
        .topbar {
            background: linear-gradient(100deg, var(--accent), var(--accent-dark));
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(255, 107, 43, .2);
            flex-shrink: 0
        }

        .topbar-logo {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', Roboto, sans-serif, sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            letter-spacing: .3px
        }

        .topbar-logo span {
            color: rgba(255, 255, 255, .6);
            font-weight: 500
        }

        .topbar-badge {
            background: rgba(255, 255, 255, .18);
            border: 1px solid rgba(255, 255, 255, .25);
            color: #fff;
            font-size: 11px;
            font-weight: 500;
            padding: 4px 12px;
            border-radius: 100px;
            letter-spacing: .5px
        }

        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow: hidden
        }

        .main::before {
            content: '';
            position: absolute;
            top: -120px;
            right: -120px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 43, .08), transparent 70%);
            pointer-events: none
        }

        .main::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 154, 92, .06), transparent 70%);
            pointer-events: none
        }

        /* ── CARD ── */
        .login-card {
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: var(--rl);
            box-shadow: var(--sh-md);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: cardIn .6s cubic-bezier(.4, 0, .2, 1) both
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(24px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card-top {
            background: var(--ink);
            padding: 36px 36px 28px;
            position: relative;
            overflow: hidden;
            text-align: center
        }

        .card-top::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 43, .14), transparent)
        }

        .card-top-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            margin: 0 auto 16px;
            position: relative;
            z-index: 1;
            box-shadow: var(--sh-or);
            animation: iconSpin .8s .3s ease both
        }

        @keyframes iconSpin {
            from {
                transform: scale(0) rotate(-180deg);
                opacity: 0
            }

            to {
                transform: scale(1) rotate(0deg);
                opacity: 1
            }
        }

        .card-top h1 {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', Roboto, sans-serif, sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -.4px;
            margin-bottom: 6px;
            position: relative;
            z-index: 1
        }

        .card-top p {
            font-size: 13px;
            color: rgba(255, 255, 255, .45);
            font-weight: 300;
            position: relative;
            z-index: 1
        }

        /* ── FORM ── */
        .card-body {
            padding: 32px 36px 36px
        }

        .tabs {
            display: flex;
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 100px;
            padding: 3px;
            gap: 2px;
            margin-bottom: 28px
        }

        .tab {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--txt3);
            cursor: pointer;
            transition: all .25s
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
            box-shadow: var(--sh-or)
        }

        .form-group {
            margin-bottom: 16px
        }

        .form-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--txt2);
            letter-spacing: .3px;
            margin-bottom: 6px;
            display: block
        }

        .input-wrap {
            position: relative
        }

        .input-wrap i {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 13px;
            color: var(--txt3);
            transition: color .2s;
            pointer-events: none
        }

        .input-wrap:focus-within i {
            color: var(--accent)
        }

        .form-input {
            width: 100%;
            background: var(--bg2);
            border: 1.5px solid var(--line);
            border-radius: var(--r);
            padding: 11px 14px 11px 40px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--ink);
            outline: none;
            transition: border .2s, background .2s
        }

        .form-input {
            padding-right: 50px;
        }

        .form-input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255, 107, 43, .1)
        }

        .form-input::placeholder {
            color: var(--txt3)
        }

        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--txt3);
            font-size: 14px;
            z-index: 10;
            padding: 15px;
        }

        .eye-btn:hover {
            color: var(--accent)
        }

        .forgot {
            text-align: right;
            margin-top: 6px
        }

        .forgot a {
            font-size: 12px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity .2s
        }

        .forgot a:hover {
            opacity: .7
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(100deg, var(--accent), var(--accent-dark));
            color: #fff;
            border: none;
            padding: 13px;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            margin-top: 22px;
            transition: all .25s;
            box-shadow: var(--sh-or)
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(255, 107, 43, .35)
        }

        .btn-login .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .btn-login.loading .btn-text {
            display: none
        }

        .btn-login.loading .spinner {
            display: block
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: var(--r);
            margin-top: 14px;
            display: none;
            align-items: center;
            gap: 8px
        }

        .error-msg.show {
            display: flex
        }

        /* register form extras */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--txt3);
            font-size: 12px
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line)
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: var(--txt3);
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--line)
        }

        .footer-note a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-logo">Zeekers<span>.</span> Helpdesk</div>
        <div class="topbar-badge"><i class="fas fa-headset" style="margin-right:5px"></i>Support Portal</div>
    </div>

    <div class="main">
        <div class="login-card">

            <div class="card-top">
                <div class="card-top-icon"><i class="fas fa-headset"></i></div>
                <h1>Support Portal</h1>
                <p>Log in or create an account to raise and track issues</p>
            </div>

            <div class="card-body">

                <!-- tabs -->
                <div class="tabs">
                    <button class="tab active" id="tabLogin" onclick="switchTab('login')">Log In</button>
                    <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
                </div>

                <!-- LOGIN PANEL -->
                <div id="loginPanel">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input class="form-input" id="loginEmail" type="email" placeholder="you@example.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input class="form-input" id="loginPass" type="password" placeholder="Your password">
                            <button type="button" class="eye-btn" onclick="toggleEye('loginPass',this)"><i
                                    class="fas fa-eye"></i></button>
                        </div>
                        <div class="forgot"><a href="#">Forgot password?</a></div>
                    </div>
                    <div class="error-msg" id="loginError"><i class="fas fa-exclamation-circle"></i><span></span></div>
                    <button class="btn-login" id="loginBtn" onclick="doLogin()">
                        <span class="btn-text">Sign In &nbsp;<i class="fas fa-arrow-right"
                                style="font-size:13px"></i></span>
                        <div class="spinner"></div>
                    </button>
                    <div style="text-align:center; margin-top:20px;">
                        <button class="btn-login" onclick="window.location.href='index.html'">
                            <i class="fas fa-home"></i>
                            Return to Homepage
                        </button>
                    </div>
                    <div class="footer-note">Don't have an account? <a href="#"
                            onclick="switchTab('register');return false">Register here</a></div>
                </div>

                <!-- REGISTER PANEL -->
                <div id="registerPanel" style="display:none">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <div class="input-wrap">
                                <i class="fas fa-user"></i>
                                <input class="form-input" id="regFirst" type="text" placeholder="First name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <div class="input-wrap">
                                <i class="fas fa-user"></i>
                                <input class="form-input" id="regLast" type="text" placeholder="Last name">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrap">
                            <i class="fas fa-envelope"></i>
                            <input class="form-input" id="regEmail" type="email" placeholder="you@example.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Organisation / College</label>
                        <div class="input-wrap">
                            <i class="fas fa-building"></i>
                            <input class="form-input" id="regOrg" type="text" placeholder="Your company or institution">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrap">
                            <i class="fas fa-lock"></i>
                            <input class="form-input" id="regPass" type="password" placeholder="Min. 8 characters">
                            <button class="eye-btn" onclick="toggleEye('regPass',this)"><i
                                    class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="error-msg" id="regError"><i class="fas fa-exclamation-circle"></i><span></span></div>
                    <button class="btn-login" id="regBtn" onclick="doRegister()">
                        <span class="btn-text">Create Account &nbsp;<i class="fas fa-arrow-right"
                                style="font-size:13px"></i></span>
                        <div class="spinner"></div>
                    </button>
                    <div class="footer-note">Already have an account? <a href="#"
                            onclick="switchTab('login');return false">Sign in</a></div>
                </div>

            </div>
        </div>
    </div>

    <script src="/assets/js/api.js?v=4"></script>
    <script>
        /* ── MySQL-backed auth via helpdesk_users table ── */

        function switchTab(t) {
            document.getElementById('tabLogin').classList.toggle('active', t === 'login');
            document.getElementById('tabRegister').classList.toggle('active', t === 'register');
            document.getElementById('loginPanel').style.display = t === 'login' ? 'block' : 'none';
            document.getElementById('registerPanel').style.display = t === 'register' ? 'block' : 'none';
            document.getElementById('loginError').classList.remove('show');
            document.getElementById('regError').classList.remove('show');
        }

        function toggleEye(id, btn) {
            const el = document.getElementById(id);
            const show = el.type === 'password';
            el.type = show ? 'text' : 'password';
            btn.querySelector('i').className =
                show ? 'fas fa-eye-slash' : 'fas fa-eye';
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.querySelector('span').textContent = msg;
            el.classList.add('show');
        }

        function setLoading(btnId, on) {
            document.getElementById(btnId).classList.toggle('loading', on);
        }

        /* localStorage helpers no longer needed — auth handled by server */

        async function doLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            document.getElementById('loginError').classList.remove('show');
            if (!email || !pass) { showError('loginError', 'Please enter email and password.'); return; }
            setLoading('loginBtn', true);
            try {
                const res = await apiFetch('helpdesk-auth.php', {
                    method: 'POST',
                    body: JSON.stringify({ email, password: pass, action: 'login' })
                });
                localStorage.setItem('zts_session', JSON.stringify(res.user));
                localStorage.setItem('zts_user_token', res.token);
                window.location.href = 'helpdesk-dashboard.html';
            } catch (e) {
                setLoading('loginBtn', false);
                showError('loginError', e.message || 'Invalid email or password.');
            }
        }

        async function doRegister() {
            const first = document.getElementById('regFirst').value.trim();
            const last = document.getElementById('regLast').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const org = document.getElementById('regOrg').value.trim();
            const pass = document.getElementById('regPass').value;
            document.getElementById('regError').classList.remove('show');
            if (!first || !last || !email || !pass) { showError('regError', 'Please fill all required fields.'); return; }
            if (pass.length < 8) { showError('regError', 'Password must be at least 8 characters.'); return; }
            setLoading('regBtn', true);
            try {
                const res = await apiFetch('helpdesk-auth.php', {
                    method: 'POST',
                    body: JSON.stringify({ first_name: first, last_name: last, email, password: pass, org, action: 'register' })
                });
                localStorage.setItem('zts_session', JSON.stringify(res.user));
                localStorage.setItem('zts_user_token', res.token);
                window.location.href = 'helpdesk-dashboard.html';
            } catch (e) {
                setLoading('regBtn', false);
                showError('regError', e.message || 'Registration failed. Try again.');
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPanel').style.display !== 'none' ? doLogin() : doRegister(); });
    </script>
</body>

</html>
